<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Galaxy 3D</title>
<style>
html,body{margin:0;overflow:hidden;background:#000;font-family:Arial}
#start{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:radial-gradient(circle,#ff5ccf,#000);z-index:100}
#start h1{color:#fff;text-shadow:0 0 25px #ff4fc3}
#start button{padding:18px 40px;font-size:22px;border:none;border-radius:30px;background:#ff2ea6;color:white;cursor:pointer}
#hint{position:fixed;top:10px;width:100%;text-align:center;color:white;z-index:5}
</style>
</head>
<body>
<div id="hint"></div>
<div id="start">
<h1>💖 LOVE GALAXY 💖</h1>
<button onclick="startGalaxy()">Открыть галактику</button>
</div>

<audio id="music" loop src="song.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,5000);
camera.position.z=1800;

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const galaxy=new THREE.Group();
scene.add(galaxy);

// stars
const starGeo=new THREE.BufferGeometry();
const pos=[];
for(let i=0;i<25000;i++){
 let r=Math.random()*2000;
 let a=Math.random()*Math.PI*2;
 pos.push(Math.cos(a)*r,(Math.random()-0.5)*900,Math.sin(a)*r);
}
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
const stars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xff99ff,size:2}));
galaxy.add(stars);

// heart
const heartGroup=new THREE.Group();
for(let t=0;t<Math.PI*2;t+=0.02){
 const x=16*Math.pow(Math.sin(t),3);
 const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
 const c=document.createElement('canvas');
 c.width=c.height=64;
 const ctx=c.getContext('2d');
 ctx.font='52px Arial';
 ctx.fillText('💖',2,52);
 const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c)}));
 sp.position.set(x*8,y*8,(Math.random()-0.5)*60);
 sp.scale.set(12,12,12);
 heartGroup.add(sp);
}
galaxy.add(heartGroup);

// photos
const loader=new THREE.TextureLoader();
const photos=[];
for(let i=1;i<=6;i++){
 const tex=loader.load(i + ".jpg");
 const mesh=new THREE.Mesh(
  new THREE.PlaneGeometry(80,100),
  new THREE.MeshBasicMaterial({map:tex,side:THREE.DoubleSide})
 );
 const ang=(i/6)*Math.PI*2;
 mesh.position.set(Math.cos(ang)*320,0,Math.sin(ang)*320);
 galaxy.add(mesh);
 photos.push(mesh);
}

// stickers
const icons=["💖","💕","💘","💝","💗","💓","💞","💜","🌹","🌸","🌺","🌷","🦋","✨","🌟","⭐","🎀","🍓","🍒","🥰","😍","😘","🐻","🐰","🌈"];
for(let i=0;i<100;i++){
 const e=icons[Math.floor(Math.random()*icons.length)];
 const c=document.createElement('canvas');
 c.width=c.height=64;
 const ctx=c.getContext('2d');
 ctx.font='48px Arial';
 ctx.fillText(e,5,50);
 const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c)}));
 const r=450+Math.random()*700;
 const a=Math.random()*Math.PI*2;
 s.position.set(Math.cos(a)*r,(Math.random()-0.5)*500,Math.sin(a)*r);
 s.scale.set(18,18,18);
 galaxy.add(s);
}

scene.add(new THREE.PointLight(0xff66dd,10));

function startGalaxy(){
 document.getElementById('start').style.display='none';
 document.getElementById('music').play().catch(()=>{});
 let z=1200;
 function fly(){
   z-=12;
   camera.position.z=z;
   if(z>700) requestAnimationFrame(fly);
 }
 fly();
}

// mouse rotate
let down=false,lx=0,ly=0;
addEventListener('mousedown',e=>{down=true;lx=e.clientX;ly=e.clientY});
addEventListener('mouseup',()=>down=false);
addEventListener('mousemove',e=>{
 if(!down)return;
 galaxy.rotation.y+=(e.clientX-lx)*0.005;
 galaxy.rotation.x+=(e.clientY-ly)*0.005;
 lx=e.clientX;ly=e.clientY;
});
let lastDistance = 0;

function getDistance(touches){
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
}

window.addEventListener('touchmove', (e) => {

    if(e.touches.length === 2){

        const distance = getDistance(e.touches);

        if(lastDistance > 0){

            camera.position.z -= (distance - lastDistance) * 3;

            camera.position.z = Math.max(
                300,
                Math.min(3000, camera.position.z)
            );
        }

        lastDistance = distance;
    }

}, { passive:false });

window.addEventListener('touchend', () => {
    lastDistance = 0;
});

function animate(){
 requestAnimationFrame(animate);
 stars.rotation.y+=0.0005;
 heartGroup.rotation.y+=0.003;
 photos.forEach((p,i)=>{
   const a=Date.now()*0.0003+i;
   p.position.x=Math.cos(a)*320;
   p.position.z=Math.sin(a)*320;
   p.lookAt(0,0,0);
 });
 renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
